name: Build and Release Skill

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Skill
        run: |
          # A .skill file is a standard zip archive
          # We explicitly bundle only the required directories, keeping out README, .git, etc.
          zip -r changelog-generation.skill SKILL.md scripts/
          
          # Include optional directories if they have contents
          if [ -d "assets" ]; then zip -r changelog-generation.skill assets/; fi
          if [ -d "references" ]; then zip -r changelog-generation.skill references/; fi

      - name: Upload Artifact (CI)
        uses: actions/upload-artifact@v4
        with:
          name: changelog-generation.skill
          path: changelog-generation.skill
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Skill
        run: |
          # A .skill file is a standard zip archive
          zip -r changelog-generation.skill SKILL.md scripts/
          if [ -d "assets" ]; then zip -r changelog-generation.skill assets/; fi
          if [ -d "references" ]; then zip -r changelog-generation.skill references/; fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: changelog-generation.skill
          generate_release_notes: true
